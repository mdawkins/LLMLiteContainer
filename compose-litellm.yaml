services:

  litellm-db:
    image: postgres:18
    container_name: litellm-db
    user: "999:999"
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: proxy_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${VOLUMES}/litellm_pgvol/data:/var/lib/postgresql
    tmpfs:
      - /var/run/postgresql:mode=0777
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxy_admin -d litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal_net

  litellm-proxy:
    container_name: litellm-proxy
    build:
      context: ./litellm_service
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    environment:
      DATABASE_URL: postgresql://proxy_admin:${POSTGRES_PASSWORD}@localhost:5432/litellm
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    depends_on:
      litellm-db:
        condition: service_healthy

  litellm-nginx:
    container_name: litellm-nginx
    build:
      context: ./nginx_service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - litellm-proxy
    networks:
      - internal_net

networks:
  internal_net:
    external: true
    name: internal_net
